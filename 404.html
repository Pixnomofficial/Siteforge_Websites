<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site is being published...</title>
<meta http-equiv="refresh" content="5">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
    color: #f2f2f2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .card {
    max-width: 480px;
    padding: 48px 36px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #6c8cff;
    border-radius: 50%;
    margin: 0 auto 28px;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }

  p {
    font-size: 15px;
    color: #a8a8bd;
    line-height: 1.6;
  }

  .dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    margin: 0 2px;
    background: #6c8cff;
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }

  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .footnote {
    margin-top: 24px;
    font-size: 12px;
    color: #6a6a80;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Your page is being published</h1>
    <p>We just deployed an update and this page is still building. It'll be ready shortly — this screen refreshes automatically.</p>
    <div class="dots" style="margin-top: 20px;">
      <span></span><span></span><span></span>
    </div>
    <div class="footnote">Auto-refreshing every 5 seconds</div>
  </div>
</body>
</html>
